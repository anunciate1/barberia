<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edward Barber | Sistema de Agenda</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main-neon: #00f2fe; --dark-bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.5s ease; }
        body { background: var(--dark-bg); color: white; font-family: 'Rajdhani', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; text-align: center; }

        /* PANTALLA DE INICIO */
        #vista-inicio {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1585747860715-2ba37e788b70?q=80&w=2074&auto=format&fit=crop');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000;
        }
        .ocultar-inicio { transform: translateY(-100%); opacity: 0; pointer-events: none; }

        .texto-neon { color: var(--main-neon) !important; text-shadow: 0 0 15px var(--main-neon); }

        header {
            width: 100%; padding: 15px 5%; background: rgba(0,0,0,0.95); 
            border-bottom: 2px solid var(--main-neon);
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 100;
        }

        .tarjeta-reserva { 
            width: 90%; max-width: 450px; margin: 40px auto; padding: 30px; 
            background: rgba(10,10,10,0.95); border-radius: 15px; 
            border: 2px solid var(--main-neon); box-shadow: 0 0 25px var(--main-neon);
            position: relative; overflow: hidden;
        }
        
        #capa-cerrado {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10;
        }
        
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; margin-top: 10px; border-radius: 5px; font-family: 'Rajdhani'; font-size: 1.1rem; text-align: center; outline: none; }

        .btn-interfaz {
            width: 100%; padding: 15px; background: transparent; color: var(--main-neon); 
            border: 2px solid var(--main-neon); font-family: 'Orbitron'; cursor: pointer; 
            margin-top: 20px; border-radius: 5px; font-weight: bold; text-transform: uppercase;
        }
        .btn-interfaz:hover { background: var(--main-neon); color: black; box-shadow: 0 0 30px var(--main-neon); }

        .btn-confirmar { width: 100%; padding: 15px; background: #128c7e; color: white; border: none; font-family: 'Orbitron'; cursor: pointer; display: none; margin-top: 15px; border-radius: 5px; font-weight: bold; justify-content: center; align-items: center; gap: 10px; }

        #panel-control {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 350px; height: 100vh;
            background: rgba(10,10,10,0.98); border-left: 2px solid var(--main-neon);
            z-index: 2000; padding: 30px 20px; transition: 0.5s; overflow-y: auto; text-align: left;
        }
        #panel-control.active { right: 0; }

        footer { width: 100%; padding: 30px; text-align: center; opacity: 0.6; font-size: 0.8rem; border-top: 1px solid #222; margin-top: auto; color: #888; }
    </style>
</head>
<body>

    <div id="vista-inicio">
        <h1 class="texto-neon" style="font-size: 2.5rem; font-family:'Orbitron';">EDWARD STUDIO</h1>
        <p style="letter-spacing: 3px; margin-bottom: 30px; color: #aaa;">ZUMPANGO DEL RÍO, GRO.</p>
        <button class="btn-interfaz" style="width:auto; padding:15px 50px;" onclick="document.getElementById('vista-inicio').classList.add('ocultar-inicio')">INGRESAR</button>
    </div>

    <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1503951914875-452162b0f3f1?q=80&w=2070&auto=format&fit=crop'); background-size: cover; z-index: -2;"></div>

    <header>
        <h2 style="font-family:'Orbitron'; font-size:0.9rem;">EDWARD BARBER</h2>
        <div onclick="abrirAdmin()" style="cursor:pointer;" class="texto-neon"><i class="fas fa-lock" style="font-size: 1.2rem;"></i></div>
    </header>

    <div id="panel-control">
        <div class="texto-neon" style="font-family:'Orbitron'; margin-bottom:20px;">ADMIN PRIVADO <i class="fas fa-times" onclick="cerrarAdmin()" style="float:right; cursor:pointer;"></i></div>
        <div style="margin-bottom: 20px; padding: 10px; border: 1px solid var(--main-neon); border-radius: 10px;">
            <p style="font-size: 0.7rem; color: #888;">ESTADO DEL LOCAL:</p>
            <button id="btnEstadoMaster" onclick="cambiarEstadoLocal()" class="btn-interfaz" style="margin-top:5px; padding: 10px; font-size: 0.8rem;">ACTUALIZANDO...</button>
        </div>
        <div id="monitorSilla" style="margin-bottom:20px; font-family:'Orbitron'; font-size: 0.8rem;">SILLA: --</div>
        <button onclick="finalizarTurno()" class="btn-interfaz" style="background:var(--main-neon); color:black; margin-bottom:10px;">SIGUIENTE CLIENTE</button>
        <div id="lista-admin" style="margin-top:20px;"></div>
    </div>

    <div class="tarjeta-reserva" id="cardPrincipal">
        <div id="capa-cerrado">
            <i class="fas fa-clock" style="font-size: 3rem; color: var(--main-neon); margin-bottom: 15px;"></i>
            <h2 class="texto-neon" style="font-family:'Orbitron';">CERRADO</h2>
            <p style="font-size: 0.9rem; color: #888; margin-top: 10px;">VUELVE PRONTO.</p>
        </div>

        <h3 class="texto-neon" style="font-family:'Orbitron';">AGENDA TU TURNO</h3>
        <input type="text" id="nombreC" placeholder="Nombre completo">
        <input type="date" id="fechaC" onchange="cargarHoras()">
        <select id="horaC" onchange="limpiarValidacion()"><option disabled selected>Selecciona fecha</option></select>
        
        <div id="msgStatus" style="text-align:center; margin-top:15px; font-family:'Orbitron'; font-weight:bold; font-size: 0.8rem;"></div>
        
        <button class="btn-interfaz" id="btnValidar" onclick="validarCupo()">REVISAR HORARIO</button>
        <button onclick="enviarAgenda()" class="btn-confirmar" id="btnFinalizar"><i class="fas fa-check-circle"></i> CONFIRMAR CITA</button>

        <div style="margin-top: 20px; font-size: 0.75rem; border: 1px solid #333; padding: 10px; border-radius: 10px; color: #888;">
            <b>AVISO:</b> Favor de estar presente 5 min antes.
        </div>
    </div>

    <footer>© 2026 EDWARD STUDIO | ZUMPANGO DEL RÍO</footer>

    <script>
        const DB_URL = "https://edward-barber-default-rtdb.firebaseio.com/"; 
        const PASS_ADMIN = "9999";

        // Ciclo de colores neon suaves
        const palette = ['#00f2fe', '#ff0055', '#0f9', '#bc13fe'];
        let pIdx = 0;
        setInterval(() => {
            document.documentElement.style.setProperty('--main-neon', palette[pIdx]);
            pIdx = (pIdx + 1) % palette.length;
        }, 5000);

        async function getDatos() { 
            const r = await fetch(DB_URL + ".json"); 
            return await r.json() || { citas: {}, status: "open", chair: "--" }; 
        }

        async function actualizarUI() {
            const d = await getDatos();
            const isClosed = d.status === "closed";
            document.getElementById('capa-cerrado').style.display = isClosed ? "flex" : "none";
            const btn = document.getElementById('btnEstadoMaster');
            btn.innerText = isClosed ? "SISTEMA: CERRADO" : "SISTEMA: ABIERTO";
            btn.style.borderColor = isClosed ? "#ff0055" : "#0f9";
            document.getElementById('monitorSilla').innerText = "EN SILLA: " + (d.chair || "--");
        }

        async function cambiarEstadoLocal() {
            const data = await getDatos();
            const nState = data.status === "open" ? "closed" : "open";
            await fetch(DB_URL + "status.json", { method: 'PUT', body: JSON.stringify(nState) });
            actualizarUI();
        }

        async function cargarHoras() {
            const fVal = document.getElementById('fechaC').value;
            const sel = document.getElementById('horaC');
            const data = await getDatos();
            const diaSemana = new Date(fVal + 'T00:00:00').getUTCDay();
            
            limpiarValidacion();
            if(diaSemana === 0) { alert("Domingos no laboral"); sel.innerHTML = '<option disabled selected>Cerrado</option>'; return; }
            
            let horas = (diaSemana >= 1 && diaSemana <= 5) ? 
            ["04:00 PM", "04:30 PM", "05:00 PM", "05:30 PM", "06:00 PM", "06:30 PM", "07:00 PM", "07:30 PM", "08:00 PM"] : 
            ["11:00 AM", "11:30 AM", "12:00 PM", "12:30 PM", "01:00 PM", "01:30 PM", "02:00 PM", "02:30 PM", "03:00 PM", "03:30 PM", "04:00 PM"];
            
            sel.innerHTML = '<option disabled selected>Elegir hora</option>';
            horas.forEach(h => {
                const ocupado = data.citas && Object.values(data.citas).some(c => c.date === fVal && c.time === h);
                let o = document.createElement('option');
                o.value = h; o.text = ocupado ? h + " (Ocupado)" : h; o.disabled = ocupado;
                sel.add(o);
            });
        }

        async function validarCupo() {
            const n = document.getElementById('nombreC').value;
            const f = document.getElementById('fechaC').value;
            const h = document.getElementById('horaC').value;
            if(!n || !f || !h) return alert("Faltan datos.");
            
            const d = await getDatos();
            const ocupado = d.citas && Object.values(d.citas).some(c => c.date === f && c.time === h);
            if(ocupado) { alert("Horario ya tomado"); cargarHoras(); return; }

            document.getElementById('msgStatus').innerText = "DISPONIBLE ✅";
            document.getElementById('btnFinalizar').style.display = "flex";
            document.getElementById('btnValidar').style.display = "none";
        }

        async function enviarAgenda() {
            const n = document.getElementById('nombreC').value;
            const f = document.getElementById('fechaC').value;
            const h = document.getElementById('horaC').value;

            const txt = `💈 *EDWARD BARBER*\n\n✅ *CITA CONFIRMADA*\n👤 *CLIENTE:* ${n.toUpperCase()}\n📅 *FECHA:* ${f}\n⏰ *HORA:* ${h}\n📍 Zumpango Del Rio\n\n_Favor de llegar 5 min antes._`;

            try {
                await fetch(DB_URL + "citas.json", { method: 'POST', body: JSON.stringify({ name: n, date: f, time: h }) });
                window.location.href = "https://api.whatsapp.com/send?phone=527471957726&text=" + encodeURIComponent(txt);
            } catch (e) {
                window.location.href = "https://api.whatsapp.com/send?phone=527471957726&text=" + encodeURIComponent(txt);
            }
        }

        function abrirAdmin() { if(prompt("ACCESO:") === PASS_ADMIN) { document.getElementById('panel-control').classList.add('active'); mostrarLista(); } }
        function cerrarAdmin() { document.getElementById('panel-control').classList.remove('active'); }
        
        async function mostrarLista() {
            const d = await getDatos();
            const div = document.getElementById('lista-admin');
            div.innerHTML = "";
            if(d.citas) {
                Object.entries(d.citas).forEach(([id, c]) => {
                    div.innerHTML += `<div style="background:#111; padding:8px; margin-bottom:5px; border-radius:5px; font-size:0.8rem; border:1px solid #222;">${c.date} | ${c.time}<br>${c.name} <i onclick="borrarCita('${id}')" class="fas fa-trash" style="color:#ff0055; float:right; cursor:pointer;"></i></div>`;
                });
            }
            actualizarUI();
        }

        async function finalizarTurno() {
            const d = await getDatos();
            if(d.citas) {
                const id = Object.keys(d.citas)[0];
                const nom = d.citas[id].name;
                await fetch(DB_URL + "chair.json", { method: 'PUT', body: JSON.stringify(nom) });
                await borrarCita(id);
            }
        }

        async function borrarCita(id) { await fetch(DB_URL + `citas/${id}.json`, { method: 'DELETE' }); mostrarLista(); }
        function limpiarValidacion() { document.getElementById('btnFinalizar').style.display="none"; document.getElementById('btnValidar').style.display="block"; document.getElementById('msgStatus').innerText=""; }
        
        document.getElementById('fechaC').setAttribute('min', new Date().toISOString().split('T')[0]);
        setInterval(actualizarUI, 10000);
        actualizarUI();
    </script>
</body>
</html>
